<!doctype html>
<html lang="{{LANG}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
:root {
  --bg:#f7f6f2;
  --paper:#fffdf8;
  --ink:#1e242b;
  --muted:#5e6874;
  --line:#d8d2c4;
  --accent:#254e70;
  --accent2:#7a4e2d;
  --soft:#ebe6da;
  --soft2:#e8eef3;
  --font-scale:1;
}
* { box-sizing:border-box; }
html, body { margin:0; height:100%; background:var(--bg); color:var(--ink); }
body { font-family:"Avenir Next","Helvetica Neue",Helvetica,Arial,sans-serif; overflow:hidden; }
.deck-shell { min-height:100vh; display:grid; place-items:center; padding:3.6vh 3vw 6.8vh; background:radial-gradient(circle at 10% 10%, #ffffff 0, transparent 28%), linear-gradient(135deg, var(--bg), #ede8dc); }
.deck { width:min(92vw, 150vh); aspect-ratio:16/9; position:relative; }
.slide { display:none; position:absolute; inset:0; padding:3.2%; }
.slide.active { display:block; }
.slide-inner { position:relative; height:100%; padding:5.2% 5.6% 4.6% 6.2%; background:var(--paper); border:1px solid var(--line); box-shadow:0 24px 70px rgba(30,36,43,.16); overflow:hidden; }
.slide-inner::before { content:""; position:absolute; left:0; top:0; bottom:0; width:12px; background:linear-gradient(180deg, var(--accent), var(--accent2)); }
.kicker { margin:0 0 .6rem; color:var(--accent2); font-size:calc(15px * var(--font-scale)); letter-spacing:.12em; text-transform:uppercase; font-weight:700; }
h1, h2 { font-family:Georgia,"Times New Roman",serif; font-weight:650; line-height:1.04; margin:.1rem 0 1.1rem; color:var(--ink); }
h1 { font-size:calc(56px * var(--font-scale)); max-width:12ch; }
h2 { font-size:calc(42px * var(--font-scale)); }
p, li { font-size:calc(24px * var(--font-scale)); line-height:1.38; }
ul { margin:0; padding-left:1.25em; }
.caption { position:absolute; left:6.2%; right:5.6%; bottom:3.5%; color:var(--muted); border-top:1px solid var(--line); padding-top:.55rem; font-size:calc(13px * var(--font-scale)); }
.small { font-size:calc(17px * var(--font-scale)); color:var(--muted); line-height:1.42; }
.columns { display:grid; grid-template-columns:1fr 1fr; gap:1rem; align-items:start; }
.columns3 { display:grid; grid-template-columns:repeat(3, 1fr); gap:.9rem; align-items:stretch; }
.card { border:1px solid var(--line); background:#fbf8f0; padding:1rem 1.1rem; border-radius:18px; }
.card.blue { background:var(--soft2); border-color:#cdd9e2; }
.card.brown { background:var(--soft); border-color:#d9cbb7; }
.card h3 { margin:.1rem 0 .5rem; color:var(--accent); font-size:calc(22px * var(--font-scale)); }
.quote { margin:1.2rem 0; padding:1.1rem 1.4rem; border-left:6px solid var(--accent2); background:var(--soft); font-family:Georgia,"Times New Roman",serif; font-size:calc(27px * var(--font-scale)); line-height:1.32; }
.compare { width:100%; border-collapse:collapse; font-size:calc(18px * var(--font-scale)); }
.compare th, .compare td { border:1px solid var(--line); padding:.65rem .75rem; text-align:left; vertical-align:top; }
.compare th { background:var(--soft2); color:var(--accent); }
.flow { display:flex; gap:.8rem; align-items:stretch; margin-top:1rem; }
.step { flex:1; border:1px solid var(--line); border-radius:16px; padding:.9rem; background:#fbf8f0; position:relative; }
.step::before { content:attr(data-step); display:inline-grid; place-items:center; width:2rem; height:2rem; border-radius:50%; background:var(--accent); color:white; font-weight:700; margin-bottom:.55rem; }
.tag { display:inline-block; padding:.25rem .55rem; border:1px solid var(--line); border-radius:999px; color:var(--accent); background:var(--soft2); font-size:calc(14px * var(--font-scale)); font-weight:700; }
.code { font-family:Menlo,Consolas,monospace; background:#f1eee6; border:1px solid var(--line); border-radius:10px; padding:.12rem .35rem; }
.controls { position:fixed; left:50%; bottom:1.4vh; transform:translateX(-50%); display:flex; gap:.35rem; align-items:center; padding:.45rem; border:1px solid rgba(216,210,196,.9); border-radius:999px; background:rgba(255,253,248,.9); backdrop-filter:blur(10px); box-shadow:0 10px 30px rgba(30,36,43,.12); z-index:10; }
.controls button { border:0; border-radius:999px; padding:.45rem .7rem; background:transparent; color:var(--ink); cursor:pointer; font-weight:700; }
.controls button:hover { background:var(--soft2); }
.counter { color:var(--muted); font-size:13px; min-width:4.8rem; text-align:center; }
.progress { position:fixed; left:0; right:0; bottom:0; height:5px; background:rgba(216,210,196,.65); z-index:11; }
.progress span { display:block; height:100%; width:0; background:linear-gradient(90deg, var(--accent), var(--accent2)); transition:width .2s ease; }
body.overview { overflow:auto; }
body.overview .deck-shell { display:block; padding:3vh 3vw 9vh; }
body.overview .deck { width:100%; height:auto; aspect-ratio:auto; display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:1rem; }
body.overview .slide { display:block; position:relative; aspect-ratio:16/9; padding:0; cursor:pointer; transform:none; }
body.overview .slide.active .slide-inner { outline:4px solid rgba(37,78,112,.28); }
body.overview .slide-inner { padding:7% 7% 8%; box-shadow:0 12px 28px rgba(30,36,43,.12); }
body.overview h1 { font-size:28px; }
body.overview h2 { font-size:23px; }
body.overview p, body.overview li { font-size:13px; }
body.overview .caption { display:none; }
@media (max-width: 760px) {
  .deck-shell { padding:1vh 1vw 8vh; }
  .deck { width:98vw; }
  h1 { font-size:calc(34px * var(--font-scale)); }
  h2 { font-size:calc(28px * var(--font-scale)); }
  p, li { font-size:calc(18px * var(--font-scale)); }
  .columns, .columns3 { grid-template-columns:1fr; gap:.6rem; }
  .caption { position:static; margin-top:1rem; }
}
@media print {
  body { overflow:visible; background:white; }
  .deck-shell { display:block; padding:0; background:white; }
  .deck { width:100%; height:auto; aspect-ratio:auto; }
  .slide, .slide.active { display:block; position:relative; page-break-after:always; width:100vw; height:56.25vw; max-height:100vh; padding:0; }
  .slide-inner { box-shadow:none; border:1px solid #ddd; }
  .controls, .progress { display:none; }
}
</style>
</head>
<body>
<main class="deck-shell">
  <section class="deck" id="deck" aria-live="polite">
{{SLIDES}}
  </section>
</main>
<nav class="controls" aria-label="Slide controls">
  <button type="button" data-action="prev">Prev</button>
  <button type="button" data-action="next">Next</button>
  <button type="button" data-action="overview">Overview</button>
  <button type="button" data-action="smaller">A-</button>
  <button type="button" data-action="larger">A+</button>
  <button type="button" data-action="fullscreen">Fullscreen</button>
  <span class="counter" id="counter">1 / 1</span>
</nav>
<div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
<script>
(function () {
  const slides = Array.from(document.querySelectorAll('.slide'));
  const counter = document.getElementById('counter');
  const progress = document.getElementById('progressBar');
  let index = Math.max(0, slides.findIndex(s => s.classList.contains('active')));
  let fontScale = 1;

  function clamp(n, min, max) { return Math.min(Math.max(n, min), max); }

  function update() {
    slides.forEach((slide, i) => slide.classList.toggle('active', i === index));
    counter.textContent = `${index + 1} / ${slides.length}`;
    progress.style.width = `${((index + 1) / slides.length) * 100}%`;
  }

  function go(nextIndex) {
    index = clamp(nextIndex, 0, slides.length - 1);
    update();
  }

  function toggleOverview(force) {
    const entering = typeof force === 'boolean' ? force : !document.body.classList.contains('overview');
    document.body.classList.toggle('overview', entering);
  }

  document.querySelector('.controls').addEventListener('click', event => {
    const action = event.target && event.target.dataset.action;
    if (!action) return;
    if (action === 'prev') go(index - 1);
    if (action === 'next') go(index + 1);
    if (action === 'overview') toggleOverview();
    if (action === 'smaller') {
      fontScale = clamp(fontScale - 0.08, 0.78, 1.35);
      document.documentElement.style.setProperty('--font-scale', fontScale.toFixed(2));
    }
    if (action === 'larger') {
      fontScale = clamp(fontScale + 0.08, 0.78, 1.35);
      document.documentElement.style.setProperty('--font-scale', fontScale.toFixed(2));
    }
    if (action === 'fullscreen') {
      if (!document.fullscreenElement && document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
      else if (document.exitFullscreen) document.exitFullscreen();
    }
  });

  slides.forEach((slide, i) => slide.addEventListener('click', () => {
    if (!document.body.classList.contains('overview')) return;
    index = i;
    toggleOverview(false);
    update();
  }));

  document.addEventListener('keydown', event => {
    if (['ArrowRight', 'PageDown', ' '].includes(event.key)) { event.preventDefault(); go(index + 1); }
    if (['ArrowLeft', 'PageUp'].includes(event.key)) { event.preventDefault(); go(index - 1); }
    if (event.key === 'Home') { event.preventDefault(); go(0); }
    if (event.key === 'End') { event.preventDefault(); go(slides.length - 1); }
    if (event.key.toLowerCase() === 'o') { event.preventDefault(); toggleOverview(); }
    if (event.key === '+' || event.key === '=') { fontScale = clamp(fontScale + 0.08, 0.78, 1.35); document.documentElement.style.setProperty('--font-scale', fontScale.toFixed(2)); }
    if (event.key === '-' || event.key === '_') { fontScale = clamp(fontScale - 0.08, 0.78, 1.35); document.documentElement.style.setProperty('--font-scale', fontScale.toFixed(2)); }
  });

  update();
}());
</script>
</body>
</html>
